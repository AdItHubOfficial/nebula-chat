# Render.com Blueprint — deploys Nebula Chat as a single web service.
# The Express server serves the built React app + the REST API + Socket.IO.
# Data is stored in a free, persistent Neon Postgres database (set DATABASE_URL).

services:
  - type: web
    name: nebula-chat
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-generates a strong secret on first deploy (persists across deploys).
      - key: JWT_SECRET
        generateValue: true
      # Set this in the Render dashboard to your Neon Postgres connection string
      # (e.g. postgresql://user:pass@ep-xxx.region.aws.neon.tech/nebula?sslmode=require).
      # Because data lives in Neon, it survives every deploy/restart.
      - key: DATABASE_URL
        sync: false
